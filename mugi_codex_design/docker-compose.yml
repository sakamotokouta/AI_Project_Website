services:
  db:
    image: postgres:16
    container_name: mugi-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mugi_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
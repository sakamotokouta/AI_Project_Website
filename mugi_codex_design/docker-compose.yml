services:
  db:
    image: postgres:16-alpine
    container_name: mugi-no-akari-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mugi_user
      POSTGRES_PASSWORD: mugi_password
      POSTGRES_DB: mugi_no_akari
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: